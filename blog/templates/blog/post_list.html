<html>
    <head>
        <title>Takumi's blog2</title>
    </head>
    <body>
        <div>
            <h1><a href="/">Takumi's blog2 </a></h1>
        </div>
        
        {% for post in posts %}
            <div>
                <p>掲載日: {{ post.published_date|date:"Y-m-d" }}</p>
                <h2><a href="">{{ post.title }}</a></h2>
                <p>{{ post.text|linebreaksbr }}</p>
            </div>
        {% endfor %}
    </body>
</html>
